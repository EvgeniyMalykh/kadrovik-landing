
services:
  db:
    image: mirror.gcr.io/library/postgres:16-alpine
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: mirror.gcr.io/library/redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  web:
    build: .
    restart: always
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 120 --reload
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - /var/log/kadrovik:/app/logs
      - /root/kadrovik/templates:/app/templates
      - /root/kadrovik/static:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery:
    build: .
    restart: always
    command: celery -A config worker -l info
    volumes:
      - /var/log/kadrovik:/app/logs
      - /root/kadrovik/templates:/app/templates
      - /root/kadrovik/static:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    dns:
      - 8.8.8.8
      - 8.8.4.4

  celery-beat:
    build: .
    restart: always
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - /var/log/kadrovik:/app/logs
      - /root/kadrovik/templates:/app/templates
      - /root/kadrovik/static:/app/static
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.production
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:
