<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявление об отпуске — {{ company.name }}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --border: #334155;
            --accent: #3b82f6;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --radius: 12px;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 24px 16px 48px;
        }
        .wrap {
            max-width: 600px;
            margin: 0 auto;
        }
        .logo-bar {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-bar .icon { font-size: 36px; }
        .logo-bar h1 { font-size: 1rem; color: var(--text-muted); margin-top: 6px; }

        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
        }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .card-sub {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 24px;
        }

        .section-title {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin: 24px 0 12px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
        }
        .section-title:first-child { margin-top: 0; }

        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }
        .form-group label .req { color: #f87171; }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 11px 14px;
            color: var(--text);
            font-size: 15px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.15s;
            -webkit-appearance: none;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
        }
        .form-group textarea { resize: vertical; min-height: 80px; }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        @media (max-width: 480px) {
            .row-2 { grid-template-columns: 1fr; }
        }

        /* Вид отпуска — карточки */
        .vac-types {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 4px;
        }
        @media (max-width: 400px) {
            .vac-types { grid-template-columns: 1fr; }
        }
        .vac-type-label {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            background: var(--bg-input);
            border: 2px solid var(--border);
            border-radius: 10px;
            padding: 14px 10px;
            cursor: pointer;
            transition: border-color 0.15s, background 0.15s;
            text-align: center;
            min-height: 44px;
        }
        .vac-type-label input[type="radio"] { display: none; }
        .vac-type-label.selected {
            border-color: var(--accent);
            background: rgba(59,130,246,0.1);
        }
        .vac-type-label .vt-icon { font-size: 22px; }
        .vac-type-label .vt-name { font-size: 0.85rem; font-weight: 600; }
        .vac-type-label .vt-sub  { font-size: 0.73rem; color: var(--text-muted); }

        /* Дней — badge */
        .days-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(59,130,246,0.12);
            border: 1px solid rgba(59,130,246,0.35);
            border-radius: 8px;
            padding: 8px 16px;
            color: var(--accent);
            font-weight: 700;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        /* Submit */
        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 24px;
            min-height: 48px;
            transition: background 0.15s;
        }
        .btn-submit:hover { background: #2563eb; }
        .btn-submit:disabled { background: #475569; cursor: default; }

        /* Error message */
        .error-msg {
            background: rgba(239,68,68,0.12);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 8px;
            padding: 12px 16px;
            color: #fca5a5;
            font-size: 0.9rem;
            margin-bottom: 16px;
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 28px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }
        .footer a { color: var(--accent); text-decoration: none; }
    </style>
</head>
<body>
<div class="wrap">
    <div class="logo-bar">
        <div class="icon">&#128203;</div>
        <h1>Кадровый автопилот</h1>
    </div>

    <div class="card">
        <div class="card-title">Заявление об отпуске</div>
        <div class="card-sub">{{ company.name }}</div>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" id="vac-request-form">
            {% csrf_token %}

            <div class="section-title">Ваши данные</div>
            <div class="form-group">
                <label>Фамилия <span class="req">*</span></label>
                <input type="text" name="last_name" placeholder="Иванов"
                       value="{{ form_data.last_name|default:'' }}" required>
            </div>
            <div class="row-2">
                <div class="form-group">
                    <label>Имя <span class="req">*</span></label>
                    <input type="text" name="first_name" placeholder="Иван"
                           value="{{ form_data.first_name|default:'' }}" required>
                </div>
                <div class="form-group">
                    <label>Отчество</label>
                    <input type="text" name="middle_name" placeholder="Иванович"
                           value="{{ form_data.middle_name|default:'' }}">
                </div>
            </div>
            <div class="form-group">
                <label>Должность <span class="req">*</span></label>
                <input type="text" name="position" placeholder="Менеджер"
                       value="{{ form_data.position|default:'' }}" required>
            </div>

            <div class="section-title">Вид отпуска</div>
            <div class="vac-types" id="vac-types">
                <label class="vac-type-label selected" onclick="selectType(this, 'annual')">
                    <input type="radio" name="vacation_type" value="annual" checked>
                    <span class="vt-icon">&#9989;</span>
                    <span class="vt-name">Оплачиваемый</span>
                    <span class="vt-sub">Ежегодный основной</span>
                </label>
                <label class="vac-type-label" onclick="selectType(this, 'additional')">
                    <input type="radio" name="vacation_type" value="additional">
                    <span class="vt-icon">&#127760;</span>
                    <span class="vt-name">Дополнительный</span>
                    <span class="vt-sub">Оплачиваемый (северный и др.)</span>
                </label>
                <label class="vac-type-label" onclick="selectType(this, 'unpaid')">
                    <input type="radio" name="vacation_type" value="unpaid">
                    <span class="vt-icon">&#128203;</span>
                    <span class="vt-name">За свой счёт</span>
                    <span class="vt-sub">Без сохранения зарплаты</span>
                </label>
                <label class="vac-type-label" onclick="selectType(this, 'educational')">
                    <input type="radio" name="vacation_type" value="educational">
                    <span class="vt-icon">&#128218;</span>
                    <span class="vt-name">Учебный</span>
                    <span class="vt-sub">По справке-вызову</span>
                </label>
                <label class="vac-type-label" onclick="selectType(this, 'maternity')">
                    <input type="radio" name="vacation_type" value="maternity">
                    <span class="vt-icon">&#128118;</span>
                    <span class="vt-name">По беременности</span>
                    <span class="vt-sub">По беременности и родам</span>
                </label>
            </div>

            <div class="section-title">Период</div>
            <div class="row-2">
                <div class="form-group">
                    <label>Дата начала <span class="req">*</span></label>
                    <input type="text" name="start_date" id="start_date"
                           placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}"
                           inputmode="numeric" autocomplete="off"
                           value="{{ form_data.start_date|default:'' }}"
                           oninput="applyMask(this); calcDays()" required>
                </div>
                <div class="form-group">
                    <label>Дата окончания <span class="req">*</span></label>
                    <input type="text" name="end_date" id="end_date"
                           placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}"
                           inputmode="numeric" autocomplete="off"
                           value="{{ form_data.end_date|default:'' }}"
                           oninput="applyMask(this); calcDays()" required>
                </div>
            </div>
            <div id="days-badge" style="display:none;" class="days-badge">
                &#128197; <span id="days-count">0</span> календарных дней
            </div>

            <div class="section-title" style="margin-top:20px;">Причина / основание</div>
            <div class="form-group">
                <label>Причина <span style="color:var(--text-muted);font-size:0.8rem;">(необязательно)</span></label>
                <textarea name="reason" placeholder="Например: семейные обстоятельства, по графику отпусков...">{{ form_data.reason|default:'' }}</textarea>
            </div>

            <button type="submit" class="btn-submit" id="submit-btn">
                Отправить заявление
            </button>
        </form>
    </div>

    <div class="footer">
        Powered by <a href="https://kadrovik-auto.ru" target="_blank">Кадровый автопилот</a>
    </div>
</div>

<script>
function selectType(label, value) {
    document.querySelectorAll('.vac-type-label').forEach(function(l){ l.classList.remove('selected'); });
    label.classList.add('selected');
    var radio = label.querySelector('input[type="radio"]');
    if (radio) radio.checked = true;
}

function applyMask(inp) {
    var raw = inp.value.replace(/\D/g, '').substring(0, 8);
    var out = '';
    if (raw.length > 0) out = raw.substring(0, 2);
    if (raw.length > 2) out += '.' + raw.substring(2, 4);
    if (raw.length > 4) out += '.' + raw.substring(4, 8);
    inp.value = out;
}

function parseDate(v) {
    if (!v) return null;
    var m = v.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
    if (!m) return null;
    return new Date(+m[3], +m[2]-1, +m[1]);
}

function calcDays() {
    var s = parseDate(document.getElementById('start_date').value);
    var e = parseDate(document.getElementById('end_date').value);
    var badge = document.getElementById('days-badge');
    var cnt   = document.getElementById('days-count');
    if (s && e && e >= s) {
        cnt.textContent = Math.round((e - s) / 86400000) + 1;
        badge.style.display = 'inline-flex';
    } else {
        badge.style.display = 'none';
    }
}

document.getElementById('vac-request-form').addEventListener('submit', function() {
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('submit-btn').textContent = 'Отправка...';
});
</script>
</body>
</html>
