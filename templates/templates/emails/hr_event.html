<!DOCTYPE html>
<html lang="ru">
<head><meta charset="UTF-8"></head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;padding:40px 20px;">
<div style="max-width:520px;margin:0 auto;background:#1e293b;border-radius:12px;padding:36px 32px;color:#f1f5f9;">
  <div style="text-align:center;margin-bottom:24px;">
    <span style="font-size:32px;">{{ icon }}</span>
    <h1 style="font-size:1.2rem;margin:8px 0 0;color:#f1f5f9;">Кадровый автопилот</h1>
  </div>
  <h2 style="font-size:1rem;margin:0 0 16px;color:#fbbf24;">{{ title }}</h2>
  <p style="color:#94a3b8;font-size:0.9rem;margin:0 0 8px;">
    Сотрудник: <strong style="color:#f1f5f9;">{{ employee_name }}</strong>
  </p>
  <p style="color:#94a3b8;font-size:0.9rem;margin:0 0 8px;">
    Должность: <strong style="color:#f1f5f9;">{{ position }}</strong>
  </p>
  <p style="color:#94a3b8;font-size:0.9rem;margin:0 0 8px;">
    Компания: <strong style="color:#f1f5f9;">{{ company_name }}</strong>
  </p>
  <p style="color:#94a3b8;font-size:0.9rem;margin:0 0 24px;">
    Дата: <strong style="color:#f1f5f9;">{{ event_date }}</strong>
  </p>
  <p style="color:#94a3b8;font-size:0.85rem;margin:0 0 24px;line-height:1.6;">
    {{ description }}
  </p>
  <div style="text-align:center;margin-bottom:24px;">
    <a href="https://app.kadrovik-auto.ru/dashboard/" style="display:inline-block;background:#3b82f6;color:#fff;padding:13px 32px;border-radius:8px;text-decoration:none;font-weight:600;font-size:0.95rem;">
      Открыть панель управления
    </a>
  </div>
  <p style="color:#64748b;font-size:0.75rem;margin:0;text-align:center;">
    Кадровый автопилот · kadrovik-auto.ru
  </p>
</div>
</body>
</html>
