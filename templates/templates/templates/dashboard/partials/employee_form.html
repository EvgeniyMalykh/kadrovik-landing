<div class="drawer-header">
    <h3>Новый сотрудник</h3>
    <button type="button" class="drawer-close" onclick="closeModal()">✕</button>
</div>
<form id="employee-add-form"
      hx-post="{% url 'dashboard:employee_add' %}"
      hx-target="#employees-table"
      hx-swap="innerHTML"
      hx-encoding="multipart/form-data"
      enctype="multipart/form-data"
      hx-on::after-request="if(event.detail.successful){closeModal()}">
    {% csrf_token %}
    <div class="drawer-body">

        <!-- Фото сотрудника -->
        <div class="form-group" style="margin-bottom:20px;">
            <label>Фото сотрудника</label>
            <input type="file" name="photo" accept="image/jpeg,image/png,image/webp"
                   style="width:100%;">
            <div style="font-size:12px;color:var(--text-secondary, #6b7280);margin-top:4px;">
                JPG, PNG или WebP, до 5 МБ
            </div>
        </div>

        <div class="form-section-title">Основные данные</div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Фамилия *</label>
                <input type="text" name="last_name" placeholder="Иванов" required>
            </div>
            <div class="form-group">
                <label>Имя *</label>
                <input type="text" name="first_name" placeholder="Иван" required>
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Отчество</label>
                <input type="text" name="middle_name" placeholder="Иванович">
            </div>
            <div class="form-group">
                <label>Дата рождения</label>
                <input type="text" name="birth_date" class="date-input" placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}">
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Место рождения</label>
                <input type="text" name="birth_place" placeholder="Город, регион">
            </div>
            <div class="form-group">
                <label>Образование</label>
                <select name="education">
                    <option value="">—</option>
                    <option value="secondary">Среднее</option>
                    <option value="secondary_special">Среднее специальное</option>
                    <option value="incomplete_higher">Неполное высшее</option>
                    <option value="higher">Высшее</option>
                    <option value="two_higher">Два высших</option>
                    <option value="postgraduate">Аспирантура / учёная степень</option>
                </select>
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Семейное положение</label>
                <select name="marital_status">
                    <option value="">—</option>
                    <option value="single">Не женат / Не замужем</option>
                    <option value="married">Женат / Замужем</option>
                    <option value="divorced">Разведён / Разведена</option>
                    <option value="widowed">Вдовец / Вдова</option>
                    <option value="cohabiting">Гражданский брак</option>
                </select>
            </div>
            <div class="form-group">
                <label>Гражданство</label>
                <input type="text" name="citizenship" value="Российская Федерация" placeholder="Российская Федерация">
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Телефон</label>
                <input type="text" name="phone" placeholder="+7 900 000 00 00">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="ivan@example.com">
            </div>
        </div>

        <div class="form-section-title">Трудовые данные</div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Должность *</label>
                <input type="text" name="position" placeholder="Менеджер" required>
            </div>
            <div class="form-group">
                <label>Оклад (₽) *</label>
                <input type="number" step="0.01" name="salary" class="form-control" placeholder="0.00">
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Дата приёма *</label>
                <input type="text" name="hire_date" class="date-input" placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}" required>
            </div>
            <div class="form-group">
                <label>Испытательный срок (мес.)</label>
                <input type="number" name="probation_months" placeholder="Не задан" min="0" max="6">
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Тип договора</label>
                <select name="contract_type">
                    <option value="permanent">Бессрочный</option>
                    <option value="fixed">Срочный</option>
                    <option value="gph">ГПХ</option>
                </select>
            </div>
            <div class="form-group">
                <label>Дата окончания договора</label>
                <input type="text" name="contract_end_date" class="date-input" placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}">
            </div>
        </div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Статус</label>
                <select name="status">
                    <option value="active">Работает</option>
                    <option value="on_leave">В отпуске</option>
                    <option value="on_sick">На больничном</option>
                    <option value="fired">Уволен</option>
                </select>
            </div>
            <div class="form-group">
                <label>Табельный номер</label>
                <div style="display:flex;gap:6px;align-items:center;">
                    <input type="text" name="personnel_number" id="personnel-number-input"
                           value="{{ next_personnel_number|default:'' }}"
                           placeholder="001" style="flex:1;">
                    <button type="button" onclick="resetPersonnelNumber()"
                            title="Сбросить на авто"
                            style="flex-shrink:0;padding:0 10px;height:38px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-secondary);cursor:pointer;font-size:14px;">&#8635;</button>
                </div>
            </div>
        </div>
        <div class="form-group">
            <label>Структурное подразделение</label>
            {% if departments %}
            <select name="department_id" id="dept-select-add" onchange="toggleNewDept('add')">
                <option value="">— не указано —</option>
                {% for d in departments %}
                <option value="{{ d.id }}">{{ d.name }}</option>
                {% endfor %}
                <option value="__new__">+ Создать новое...</option>
            </select>
            {% else %}
            <select name="department_id" id="dept-select-add" onchange="toggleNewDept('add')">
                <option value="">— не указано —</option>
                <option value="__new__">+ Создать новое...</option>
            </select>
            {% endif %}
            <input type="text" name="department_new" id="dept-new-add"
                   placeholder="Название нового подразделения" style="display:none;margin-top:6px;">
        </div>

        <div class="form-section-title">Паспортные данные</div>
        <div class="form-row-3">
            <div class="form-group">
                <label>Серия</label>
                <input type="text" name="passport_series" maxlength="4" placeholder="0000">
            </div>
            <div class="form-group">
                <label>Номер</label>
                <input type="text" name="passport_number" maxlength="6" placeholder="000000">
            </div>
            <div class="form-group">
                <label>Дата выдачи</label>
                <input type="text" name="passport_issued_date" class="date-input" placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}">
            </div>
        </div>
        <div class="form-group">
            <label>Кем выдан</label>
            <input type="text" name="passport_issued_by" placeholder="Отдел МВД России...">
        </div>
        <div class="form-group">
            <label>Адрес регистрации</label>
            <input type="text" name="passport_registration" placeholder="г. Москва, ул. ...">
        </div>

        <div class="form-section-title">Реквизиты</div>
        <div class="form-row-2">
            <div class="form-group">
                <label>ИНН</label>
                <input type="text" name="inn" maxlength="12" placeholder="123456789012">
            </div>
            <div class="form-group">
                <label>СНИЛС</label>
                <input type="text" name="snils" maxlength="14" placeholder="000-000-000 00">
            </div>
        </div>

    </div><!-- /drawer-body -->
    <div class="drawer-footer">
        <button type="button" class="btn-secondary" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn-primary">Сохранить сотрудника</button>
    </div>
</form>
