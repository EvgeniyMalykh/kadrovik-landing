<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Кадровый автопилот{% endblock %}</title>
    <script>document.documentElement.setAttribute('data-theme',localStorage.getItem('kadrovik-theme')||'dark');</script>
    <link rel="stylesheet" href="/static/css/dashboard.css?v=16">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-logo">
            <span class="logo-icon">📋</span>
            <span class="logo-text">Кадровый автопилот</span>
        </div>
        <div class="auth-card">
            {% block content %}{% endblock %}
        </div>
        <div class="auth-footer">
            <a href="https://kadrovik-auto.ru">← На главную</a>
        </div>
    </div>
</body>
</html>
