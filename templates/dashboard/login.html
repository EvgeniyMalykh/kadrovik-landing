{% extends "base_auth.html" %}
{% block title %}Вход — Кадровый автопилот{% endblock %}
{% block content %}
<h2 class="auth-title">Войти в кабинет</h2>
{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}
<form method="post" action="{% url 'dashboard:login' %}">
    {% csrf_token %}
    <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="you@company.ru" required autofocus
               lang="en" autocomplete="email" inputmode="email">
    </div>
    <div class="form-group">
        <label style="display:flex;justify-content:space-between;align-items:center;">
            Пароль
            <a href="{% url 'dashboard:forgot_password' %}" style="font-size:0.8rem;color:var(--accent);text-decoration:none;">Забыли пароль?</a>
        </label>
        <input type="password" name="password" placeholder="••••••••" required
               lang="en" autocomplete="current-password">
    </div>
    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" name="remember_me" id="remember_me">
        <label class="form-check-label" for="remember_me">Запомнить меня</label>
    </div>
    <button type="submit" class="btn-primary btn-full">Войти</button>
</form>
<p class="auth-switch">Нет аккаунта? <a href="{% url 'dashboard:register' %}">Зарегистрироваться</a></p>
<script>
document.querySelectorAll('input[type="email"], input[name="email"], input[type="password"]').forEach(function(input) {
    input.addEventListener('focus', function() {
        this.setAttribute('lang', 'en');
        this.setAttribute('autocomplete', this.type === 'password' ? 'current-password' : 'email');
    });
});
</script>
{% endblock %}
