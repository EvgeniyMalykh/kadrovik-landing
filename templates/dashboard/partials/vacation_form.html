<div class="drawer-header">
    <h3>Заявление об отпуске</h3>
    <button type="button" class="drawer-close" onclick="closeModal()">✕</button>
</div>
<form id="vacation-add-form" method="POST" onsubmit="submitVacationForm(event)">
    {% csrf_token %}
    <div class="drawer-body">

        <div class="form-section-title">Сотрудник</div>
        <div class="form-group">
            <label>Выберите сотрудника *</label>
            <select name="employee_id" required>
                <option value="">— выберите сотрудника —</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}">{{ emp.last_name }} {{ emp.first_name }}{% if emp.middle_name %} {{ emp.middle_name }}{% endif %}{% if emp.position %} — {{ emp.position }}{% endif %}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-section-title">Вид отпуска</div>
        <div class="vac-type-cards" id="vac-type-selector">
            <label class="vac-type-card vac-type-card--selected">
                <input type="radio" name="vacation_type" value="annual" checked onchange="selectVacType(this)">
                <div class="vac-type-card__icon">✅</div>
                <div class="vac-type-card__label">Оплачиваемый</div>
                <div class="vac-type-card__sub">Ежегодный основной</div>
            </label>
            <label class="vac-type-card">
                <input type="radio" name="vacation_type" value="unpaid" onchange="selectVacType(this)">
                <div class="vac-type-card__icon">📋</div>
                <div class="vac-type-card__label">За свой счёт</div>
                <div class="vac-type-card__sub">Без сохранения зарплаты</div>
            </label>
            <label class="vac-type-card">
                <input type="radio" name="vacation_type" value="educational" onchange="selectVacType(this)">
                <div class="vac-type-card__icon">📚</div>
                <div class="vac-type-card__label">Учебный</div>
                <div class="vac-type-card__sub">По справке-вызову</div>
            </label>
            <label class="vac-type-card">
                <input type="radio" name="vacation_type" value="maternity" onchange="selectVacType(this)">
                <div class="vac-type-card__icon">👶</div>
                <div class="vac-type-card__label">Декретный</div>
                <div class="vac-type-card__sub">По беременности и родам</div>
            </label>
        </div>

        <div class="form-section-title" style="margin-top:20px;">Период отпуска</div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Дата начала *</label>
                <input type="text" name="start_date" class="date-input vac-date"
                       placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}" required
                       oninput="calcVacDays()">
            </div>
            <div class="form-group">
                <label>Дата окончания *</label>
                <input type="text" name="end_date" class="date-input vac-date"
                       placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}" required
                       oninput="calcVacDays()">
            </div>
        </div>

        <div id="vac-days-preview" style="display:none; margin-bottom:16px;">
            <div class="vac-days-badge">
                <span id="vac-days-count">0</span> календарных дней
            </div>
        </div>

        <div class="form-section-title">Причина / основание</div>
        <div class="form-group">
            <label>Причина <span style="color:var(--text-secondary);font-size:0.8rem;">(необязательно)</span></label>
            <textarea name="reason" rows="3"
                      placeholder="Например: семейные обстоятельства, по графику отпусков, по уходу за ребёнком..."
                      style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text-primary);font-size:14px;resize:vertical;width:100%;outline:none;font-family:inherit;"></textarea>
        </div>

        <!-- Блок успеха — скрыт до сохранения -->
        <div id="vac-success-block" style="display:none;margin-top:12px;padding:14px 16px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.3);border-radius:10px;">
            <div style="font-weight:600;color:#34d399;margin-bottom:10px;">✓ Заявление сохранено</div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                <a id="vac-print-link" href="#" target="_blank"
                   style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:#059669;color:#fff;border-radius:8px;text-decoration:none;font-size:0.85rem;font-weight:600;">
                    🖨️ Распечатать заявление
                </a>
                <button type="button" onclick="resetVacationForm()"
                        style="padding:8px 16px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;color:var(--text-primary);font-size:0.85rem;cursor:pointer;">
                    + Новое заявление
                </button>
            </div>
        </div>

    </div><!-- /drawer-body -->
    <div class="drawer-footer" id="vac-footer">
        <button type="button" class="btn-secondary" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn-primary" id="vac-submit-btn">Сохранить заявление</button>
    </div>
</form>

<script>
function selectVacType(radio) {
    document.querySelectorAll('.vac-type-card').forEach(c => c.classList.remove('vac-type-card--selected'));
    radio.closest('.vac-type-card').classList.add('vac-type-card--selected');
}

function calcVacDays() {
    var startEl = document.querySelector('input[name="start_date"]');
    var endEl   = document.querySelector('input[name="end_date"]');
    if (!startEl || !endEl) return;
    var parse = function(v) {
        if (!v) return null;
        var m = v.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
        if (m) return new Date(+m[3], +m[2]-1, +m[1]);
        return null;
    };
    var s = parse(startEl.value);
    var e = parse(endEl.value);
    var preview = document.getElementById('vac-days-preview');
    var cnt     = document.getElementById('vac-days-count');
    if (s && e && e >= s) {
        var days = Math.round((e - s) / 86400000) + 1;
        cnt.textContent = days;
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }
}

function submitVacationForm(e) {
    e.preventDefault();
    var form = document.getElementById('vacation-add-form');
    var formData = new FormData(form);
    var btn = document.getElementById('vac-submit-btn');
    btn.disabled = true;
    btn.textContent = 'Сохранение...';

    var csrf = document.cookie.match('(^|;) ?csrftoken=([^;]*)(;|$)');
    csrf = csrf ? csrf[2] : '';

    fetch('/vacations/add/', {
        method: 'POST',
        headers: {
            'X-CSRFToken': csrf,
            'X-Requested-With': 'XMLHttpRequest'
        },
        body: formData
    })
    .then(function(r) {
        if (!r.ok) throw new Error('HTTP ' + r.status);
        return r.json();
    })
    .then(function(data) {
        if (data.success) {
            // Show success block with print link
            document.getElementById('vac-print-link').href = '/vacations/' + data.vacation_id + '/print/';
            document.getElementById('vac-success-block').style.display = 'block';
            document.getElementById('vac-footer').style.display = 'none';
            // Reload vacations table in background
            fetch('/vacations/', { headers: {'X-Requested-With': 'XMLHttpRequest'} })
                .then(r => r.text())
                .then(function(html) {
                    // Parse the vacations-table div from the response
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(html, 'text/html');
                    var newTable = doc.getElementById('vacations-table');
                    var curTable = document.getElementById('vacations-table');
                    if (newTable && curTable) {
                        curTable.innerHTML = newTable.innerHTML;
                        if (window.htmx) htmx.process(curTable);
                    }
                })
                .catch(function(){});
        } else {
            btn.disabled = false;
            btn.textContent = 'Сохранить заявление';
            alert('Ошибка: ' + (data.error || 'неизвестная'));
        }
    })
    .catch(function(err) {
        btn.disabled = false;
        btn.textContent = 'Сохранить заявление';
        alert('Ошибка сети');
    });
}

function resetVacationForm() {
    document.getElementById('vacation-add-form').reset();
    document.getElementById('vac-success-block').style.display = 'none';
    document.getElementById('vac-footer').style.display = 'flex';
    document.getElementById('vac-submit-btn').disabled = false;
    document.getElementById('vac-submit-btn').textContent = 'Сохранить заявление';
    document.getElementById('vac-days-preview').style.display = 'none';
    document.querySelectorAll('.vac-type-card').forEach(c => c.classList.remove('vac-type-card--selected'));
    document.querySelector('.vac-type-card').classList.add('vac-type-card--selected');
}
</script>
