<div class="drawer-header">
    <h3>Заявление об отпуске</h3>
    <button type="button" class="drawer-close" onclick="closeModal()">✕</button>
</div>
<form id="vacation-add-form"
      hx-post="/vacations/add/"
      hx-target="#vacations-table"
      hx-swap="innerHTML"
      hx-on::after-request="closeModal()">
    {% csrf_token %}
    <div class="drawer-body">

        <div class="form-section-title">Сотрудник</div>
        <div class="form-group">
            <label>Выберите сотрудника *</label>
            <select name="employee_id" required>
                <option value="">— выберите сотрудника —</option>
                {% for emp in employees %}
                <option value="{{ emp.id }}">{{ emp.last_name }} {{ emp.first_name }}{% if emp.middle_name %} {{ emp.middle_name }}{% endif %}{% if emp.position %} — {{ emp.position }}{% endif %}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-section-title">Вид отпуска</div>
        <div class="vac-type-cards" id="vac-type-selector">
            <label class="vac-type-card vac-type-card--selected">
                <input type="radio" name="vacation_type" value="annual" checked onchange="selectVacType(this)">
                <div class="vac-type-card__icon">✅</div>
                <div class="vac-type-card__label">Оплачиваемый</div>
                <div class="vac-type-card__sub">Ежегодный основной</div>
            </label>
            <label class="vac-type-card">
                <input type="radio" name="vacation_type" value="unpaid" onchange="selectVacType(this)">
                <div class="vac-type-card__icon">📋</div>
                <div class="vac-type-card__label">За свой счёт</div>
                <div class="vac-type-card__sub">Без сохранения зарплаты</div>
            </label>
            <label class="vac-type-card">
                <input type="radio" name="vacation_type" value="educational" onchange="selectVacType(this)">
                <div class="vac-type-card__icon">📚</div>
                <div class="vac-type-card__label">Учебный</div>
                <div class="vac-type-card__sub">По справке-вызову</div>
            </label>
            <label class="vac-type-card">
                <input type="radio" name="vacation_type" value="maternity" onchange="selectVacType(this)">
                <div class="vac-type-card__icon">👶</div>
                <div class="vac-type-card__label">Декретный</div>
                <div class="vac-type-card__sub">По беременности и родам</div>
            </label>
        </div>

        <div class="form-section-title" style="margin-top:20px;">Период отпуска</div>
        <div class="form-row-2">
            <div class="form-group">
                <label>Дата начала *</label>
                <input type="text" name="start_date" class="date-input vac-date"
                       placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}" required
                       oninput="calcVacDays()">
            </div>
            <div class="form-group">
                <label>Дата окончания *</label>
                <input type="text" name="end_date" class="date-input vac-date"
                       placeholder="ДД.ММ.ГГГГ" pattern="\d{2}\.\d{2}\.\d{4}" required
                       oninput="calcVacDays()">
            </div>
        </div>

        <div id="vac-days-preview" style="display:none; margin-bottom:16px;">
            <div class="vac-days-badge">
                <span id="vac-days-count">0</span> календарных дней
            </div>
        </div>

        <div class="form-section-title">Причина / основание</div>
        <div class="form-group">
            <label>Причина <span style="color:var(--text-secondary);font-size:0.8rem;">(необязательно)</span></label>
            <textarea name="reason" rows="3"
                      placeholder="Например: семейные обстоятельства, по графику отпусков, по уходу за ребёнком..."
                      style="background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text-primary);font-size:14px;resize:vertical;width:100%;outline:none;font-family:inherit;"></textarea>
        </div>

    </div><!-- /drawer-body -->
    <div class="drawer-footer">
        <button type="button" class="btn-secondary" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn-primary">Сохранить заявление</button>
    </div>
</form>

<script>
function selectVacType(radio) {
    document.querySelectorAll('.vac-type-card').forEach(c => c.classList.remove('vac-type-card--selected'));
    radio.closest('.vac-type-card').classList.add('vac-type-card--selected');
}

function calcVacDays() {
    var startEl = document.querySelector('input[name="start_date"]');
    var endEl   = document.querySelector('input[name="end_date"]');
    if (!startEl || !endEl) return;
    var parse = function(v) {
        if (!v) return null;
        var m = v.match(/^(\d{2})\.(\d{2})\.(\d{4})$/);
        if (m) return new Date(+m[3], +m[2]-1, +m[1]);
        return null;
    };
    var s = parse(startEl.value);
    var e = parse(endEl.value);
    var preview = document.getElementById('vac-days-preview');
    var cnt     = document.getElementById('vac-days-count');
    if (s && e && e >= s) {
        var days = Math.round((e - s) / 86400000) + 1;
        cnt.textContent = days;
        preview.style.display = 'block';
    } else {
        preview.style.display = 'none';
    }
}
</script>
