<div class="modal-header">
    <h3>Редактировать сотрудника</h3>
    <button type="button" class="modal-close" onclick="closeModal()">x</button>
</div>
<form hx-post="{% url 'dashboard:employee_edit' emp.id %}"
      hx-target="#employees-table"
      hx-swap="innerHTML"
      hx-on::after-request="closeModal()">
    {% csrf_token %}
    <div class="form-row">
        <div class="form-group">
            <label>Фамилия *</label>
            <input type="text" name="last_name" value="{{ emp.last_name }}" required>
        </div>
        <div class="form-group">
            <label>Имя *</label>
            <input type="text" name="first_name" value="{{ emp.first_name }}" required>
        </div>
        <div class="form-group">
            <label>Отчество</label>
            <input type="text" name="middle_name" value="{{ emp.middle_name }}">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Должность *</label>
            <input type="text" name="position" value="{{ emp.position }}" required>
        </div>
        <div class="form-group">
            <label>Оклад (руб.)</label>
            <input type="number" name="salary" value="{{ emp.salary }}">
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Дата рождения</label>
            <input type="date" name="birth_date" value="{{ birth_date_str }}">
        </div>
        <div class="form-group">
            <label>Дата приёма *</label>
            <input type="date" name="hire_date" value="{{ hire_date_str }}" required>
        </div>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Серия паспорта</label>
            <input type="text" name="passport_series" value="{{ emp.passport_series }}" maxlength="4" placeholder="0000">
        </div>
        <div class="form-group">
            <label>Номер паспорта</label>
            <input type="text" name="passport_number" value="{{ emp.passport_number }}" maxlength="6" placeholder="000000">
        </div>
    </div>
    <div class="form-group">
        <label>Кем выдан паспорт</label>
        <input type="text" name="passport_issued_by" value="{{ emp.passport_issued_by }}">
    </div>
    <div class="form-group">
        <label>Адрес регистрации</label>
        <input type="text" name="passport_registration" value="{{ emp.passport_registration }}">
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Телефон</label>
            <input type="text" name="phone" value="{{ emp.phone }}">
        </div>
        <div class="form-group">
            <label>ИНН</label>
            <input type="text" name="inn" value="{{ emp.inn }}">
        </div>
    </div>
    <div class="form-group">
        <label>СНИЛС</label>
        <input type="text" name="snils" value="{{ emp.snils }}">
    </div>
    <div class="modal-actions">
        <button type="button" class="btn-secondary" onclick="closeModal()">Отмена</button>
        <button type="submit" class="btn-primary">Сохранить</button>
    </div>
</form>
