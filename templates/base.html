<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Кадровый автопилот{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/dashboard.css?v=2">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        // CSRF для HTMX POST запросов
        document.body.addEventListener("htmx:configRequest", function(e) {
            e.detail.headers["X-CSRFToken"] = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || "";
        });
    </script>
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">📋</span>
            <span class="logo-text">Кадровый автопилот</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'dashboard:employees' %}" class="nav-item {% block nav_employees %}{% endblock %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Сотрудники
            </a>
            <a href="{% url 'dashboard:company' %}" class="nav-item {% block nav_company %}{% endblock %}">
                <span class="nav-icon">🏢</span>
                <span>Компания</span>
            </a>
            <a href="{% url 'dashboard:subscription' %}" class="nav-item {% block nav_subscription %}{% endblock %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                Подписка
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">{{ request.user.email|first|upper }}</div>
                <div class="user-details">
                    <div class="user-email">{{ request.user.email }}</div>
                </div>
            </div>
            <a href="{% url 'dashboard:logout' %}" class="nav-item nav-logout">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Выйти
            </a>
        </div>
    </aside>
    <main class="main-content">
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>
    <div id="modal-overlay" class="modal-overlay" style="display:none" onclick="closeModal()">
        <div id="modal-content" class="modal-content" onclick="event.stopPropagation()"></div>
    </div>
    <script>
        function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function openAddEmployeeModal() {
            fetch('/dashboard/employees/add/', {headers: {'X-Requested-With': 'XMLHttpRequest'}})
                .then(r => r.text())
                .then(html => {
                    document.getElementById('modal-content').innerHTML = html;
                    openModal();
                    htmx.process(document.getElementById('modal-content'));
                });
        }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'modal-content') openModal();
        });
    </script>
</body>
</html>
