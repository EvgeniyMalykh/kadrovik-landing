<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Кадровый автопилот{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/dashboard.css?v=3">
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script>
        // CSRF для HTMX POST запросов
        document.body.addEventListener("htmx:configRequest", function(e) {
            e.detail.headers["X-CSRFToken"] = document.cookie.match(/csrftoken=([^;]+)/)?.[1] || "";
        });
    </script>
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="logo-icon">📋</span>
            <span class="logo-text">Кадровый автопилот</span>
        </div>
        <nav class="sidebar-nav">
            <a href="{% url 'dashboard:employees' %}" class="nav-item {% block nav_employees %}{% endblock %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                Сотрудники
            </a>
            <a href="{% url 'dashboard:timesheet_edit' %}" class="nav-item {% block nav_timesheet %}{% endblock %}">
                <span class="nav-icon">📅</span>
                <span>Табель</span>
            </a>
            <a href="{% url 'dashboard:company' %}" class="nav-item {% block nav_company %}{% endblock %}">
                <span class="nav-icon">🏢</span>
                <span>Компания</span>
            </a>
            <a href="{% url 'dashboard:subscription' %}" class="nav-item {% block nav_subscription %}{% endblock %}">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
                Подписка
            </a>
        </nav>
        <div class="sidebar-footer">
            <div class="user-info">
                <div class="user-avatar">{{ request.user.email|first|upper }}</div>
                <div class="user-details">
                    <div class="user-email">{{ request.user.email }}</div>
                </div>
            </div>
            <a href="{% url 'dashboard:logout' %}" class="nav-item nav-logout">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Выйти
            </a>
        </div>
    </aside>
    <main class="main-content">
        <div class="content-wrapper">
            {% block content %}{% endblock %}
        </div>
    </main>
    <div id="modal-overlay" class="drawer-overlay" style="display:none" onclick="closeModal()">
        <div id="modal-content" class="drawer-panel" onclick="event.stopPropagation()">
            <!-- content injected by HTMX -->
        </div>
    </div>
    <script>
        function openModal() { document.getElementById('modal-overlay').style.display = 'flex'; }
        function closeModal() { document.getElementById('modal-overlay').style.display = 'none'; }
        function toggleNewDept(suffix) {
            var sel = document.getElementById('dept-select-' + suffix);
            var inp = document.getElementById('dept-new-' + suffix);
            if (!sel || !inp) return;
            if (sel.value === '__new__') {
                inp.style.display = 'block';
                inp.required = true;
                inp.focus();
            } else {
                inp.style.display = 'none';
                inp.required = false;
                inp.value = '';
            }
        }

        function openAddEmployeeModal() {
            fetch('/dashboard/employees/add/', {headers: {'X-Requested-With': 'XMLHttpRequest'}})
                .then(r => r.text())
                .then(html => {
                    document.getElementById('modal-content').innerHTML = html;
                    openModal();
                    htmx.process(document.getElementById('modal-content'));
                });
        }
        document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        document.body.addEventListener('htmx:afterSwap', function(e) {
            if (e.detail.target.id === 'modal-content') openModal();
        });
    </script>

    <script>
    // ─── Маска ввода дат (ДД.ММ.ГГГГ) ───────────────────────────────────────
    function initDateMasks(root) {
        var inputs = (root.querySelectorAll) ? root.querySelectorAll(".date-input") : [];
        inputs.forEach(function(inp) {
            if (inp._dateMaskAttached) return;
            inp._dateMaskAttached = true;
            inp.addEventListener("input", function() {
                var pos = inp.selectionStart;
                var raw = inp.value.replace(/\D/g, "").substring(0, 8);
                var out = "";
                if (raw.length > 0) out = raw.substring(0, 2);
                if (raw.length > 2) out += "." + raw.substring(2, 4);
                if (raw.length > 4) out += "." + raw.substring(4, 8);
                inp.value = out;
            });
            inp.addEventListener("keydown", function(e) {
                // Allow: backspace, delete, tab, escape, arrows
                if ([8,9,27,37,38,39,40,46].indexOf(e.keyCode) !== -1) return;
                // Allow digits only
                if ((e.keyCode < 48 || e.keyCode > 57) && (e.keyCode < 96 || e.keyCode > 105)) {
                    e.preventDefault();
                }
            });
        });
    }
    document.addEventListener("DOMContentLoaded", function() {
        initDateMasks(document);
    });
    // Re-init after HTMX loads modal content
    document.addEventListener("htmx:afterSettle", function(e) {
        initDateMasks(e.detail.elt || document);
    });
    document.body.addEventListener("htmx:afterSwap", function(e) {
        initDateMasks(e.detail.target || document);
    });
    </script>
</body>
</html>
